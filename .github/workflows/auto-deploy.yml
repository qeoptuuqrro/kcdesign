name: Auto Deploy

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [in_progress]

permissions:
  contents: read
  deployments: write
  pages: write
  id-token: write
  actions: write

jobs:
  auto-approve-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Auto approve requested deploy run
        run: |
          DEPLOYMENT_ID=$(gh api repos/${{ github.repository }}/deployments --jq ".[] | select(.ref == \"${{ github.event.workflow_run.head_sha }}\") | .id" | head -1)
          if [ -n "$DEPLOYMENT_ID" ]; then
            gh api -X POST repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses -f state=success
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
